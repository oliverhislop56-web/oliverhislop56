<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Website</title>
  <style>
    /* Basic reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; scroll-behavior: smooth; }

    /* Navigation bar */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #333;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 10px 0;
      z-index: 1000;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }
    nav a:hover { text-decoration: underline; }

    /* Sections */
    section {
      min-height: 100vh;
      padding: 80px 20px 20px; /* top padding to avoid nav overlap */
    }
    #home { background: #f4f4f4; }
    #about { background: #e8e8e8; }
    #services { background: #dcdcdc; }
    #contact { background: #ccc; }

    /* Section titles */
    h1 { margin-bottom: 20px; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- Sections -->
  <section id="home">
    <h1>Home</h1>
    <!-- Paste home page content here -->
    <p>Welcome to our website!</p>
  </section>

  <section id="about">
    <h1>About</h1>
    <!-- Paste about page content here -->
    <p>About our business.</p>
  </section>

  <section id="services">
    <h1>Services</h1>
    <!-- Paste services page content here -->
    <p>Here are the services we offer.</p>
  </section>

  <section id="contact">
    <h1>Contact</h1>
    <!-- Paste contact page content here -->
    <p>Contact us at example@email.com</p>
  </section>

</body>
</html>
